<style>
  .awhl-header {
    font-family: Arial, Helvetica, sans-serif;
    max-width: 100%;
    margin: 0 auto;
    padding: 0 4px;
    border-collapse: collapse;
    table-layout: fixed;
    width: 100%;
  }
  .awhl-header .title-row td {
    background: #1a1a2e;
    color: #fff;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    padding: 8px;
    border-radius: 6px 6px 0 0;
  }
  .awhl-header .div-row th {
    background: #0f3460;
    color: #fff;
    font-size: 14px;
    padding: 6px 4px;
  }
  .awhl-header .team-row td {
    border: 1px solid #ccc;
    text-align: center;
    vertical-align: top;
    padding: 8px 4px;
    font-size: 13px;
    font-weight: bold;
    background: #fff;
    line-height: 1.8;
  }
  .awhl-header .footer-row td {
    background: #16213e;
    color: #fff;
    text-align: center;
    font-size: 12px;
    font-style: italic;
    padding: 6px;
    border-radius: 0 0 4px 4px;
  }
  @media (max-width: 500px) {
    .awhl-header .title-row td { font-size: 16px; }
    .awhl-header .div-row th { font-size: 12px; }
    .awhl-header .team-row td { font-size: 11px; }
  }
</style>

<table class="awhl-header">
  <tr class="title-row"><td colspan="2">2026 AWHL Rec Tournament Divisions</td></tr>
  <tr class="div-row"><th width="50%">AMERICAN</th><th width="50%">NATIONAL</th></tr>
  <tr class="team-row">
    <td>Fireweed<br>Northern Lights<br>Weaver Brothers</td>
    <td>Alpenglow<br>Champions Choice<br>Play It Again Sports<br>Rebound</td>
  </tr>
</table>
